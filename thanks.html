<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You – Broken Bayou HOA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thanks-wrap {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 32px;
    }
    .thanks-wrap h1 {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 32px;
      color: #222;
      margin-bottom: 16px;
    }
    .thanks-wrap p {
      font-size: 16px;
      color: #666;
      margin-bottom: 32px;
    }
    .thanks-wrap a {
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
      border-bottom: 1px solid #333;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <header id="header">
    <nav class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="https://images.squarespace-cdn.com/content/v1/5fb421df876e407b918720fe/1609310507066-4T8LWHC1R2J63N04YYH2/Logo-Black.png?format=1500w"
             alt="Broken Bayou Homeowners Association" />
      </a>
    </nav>
  </header>
  <main style="padding-top:72px;">
    <div class="thanks-wrap">
      <h1>Thank you for reaching out.</h1>
      <p>We've received your message and will be in touch shortly.</p>
      <a href="index.html">← Back to Home</a>
    </div>
  </main>
</body>
</html>
